<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTile IoT - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="glass-panel">
            <div class="logo-container">
                <div class="logo-icon">
                    <div class="pulse-ring"></div>
                    <svg viewBox="0 0 100 100" class="logo-svg">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#007ACC" stroke-width="3"/>
                        <circle cx="50" cy="50" r="25" fill="#007ACC" opacity="0.3"/>
                        <path d="M 30 50 L 45 65 L 70 35" stroke="#00FF88" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1 class="app-title">SmartTile<span class="accent">IoT</span></h1>
                <p class="tagline">Real-Time Alert System</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="off">
                    <div class="input-line"></div>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <div class="input-line"></div>
                </div>
                
                <button type="submit" class="login-btn">
                    <span>Access Dashboard</span>
                    <div class="btn-glow"></div>
                </button>
            </form>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>

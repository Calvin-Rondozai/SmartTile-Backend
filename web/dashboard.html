<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTile IoT - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <!-- Header -->
    <header class="dashboard-header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="dashboard-title">SmartTile<span class="accent">IoT</span></h1>
                <div class="user-info">
                    <span class="user-name" id="userName">Admin</span>
                </div>
            </div>
            <div class="header-right">
                <div class="connection-status" id="connectionStatus">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Connecting...</span>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </header>
    
    <!-- Main Dashboard -->
    <main class="dashboard-main">
        <!-- Alert Feed Section -->
        <section class="alert-feed-section">
            <div class="glass-panel">
                <div class="section-header">
                    <h2>Real-Time Alerts</h2>
                    <div class="alert-count" id="alertCount">0</div>
                </div>
                <div class="alert-feed" id="alertFeed">
                    <div class="no-alerts">
                        <div class="no-alerts-icon">
                            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M4 12a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="2" opacity="0.8"/>
                                <path d="M7 12a5 5 0 0 1 10 0" stroke="currentColor" stroke-width="2" opacity="0.6"/>
                                <path d="M10 12a2 2 0 0 1 4 0" stroke="currentColor" stroke-width="2" opacity="0.5"/>
                                <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
                            </svg>
                        </div>
                        <p>Waiting for alerts…</p>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Control Panel -->
        <section class="control-panel-section">
            <div class="glass-panel">
                <h2>Control Panel</h2>
                <div class="controls-container">
                    <button class="buzzer-btn" id="buzzerBtn">
                        <div class="btn-inner">
                            <svg class="btn-icon" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="3"/>
                                <path d="M 35 35 L 65 65 M 65 35 L 35 65" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                            </svg>
                            <span class="btn-text">Turn Off Buzzer</span>
                        </div>
                        <div class="btn-ripple"></div>
                        <div class="btn-pulse"></div>
                    </button>
                    
                    <div class="toggle-group">
                        <label class="toggle-label">
                            <input type="checkbox" id="muteToggle" class="toggle-input">
                            <span class="toggle-slider"></span>
                            <span class="toggle-text">Mute Alerts</span>
                        </label>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Alert History -->
        <section class="history-section">
            <div class="glass-panel">
                <div class="section-header collapsible" id="historyHeader">
                    <h2>Alert History</h2>
                    <button class="collapse-btn" id="collapseBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                </div>
                <div class="history-content" id="historyContent">
                    <div class="history-list" id="historyList">
                        <div class="no-history">No alerts yet</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <script src="config.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
